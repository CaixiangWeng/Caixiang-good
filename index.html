<script>
    // 2. 你的配置
    const firebaseConfig = {

        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebasedatabase.app",
        projectId: "caixiang666-stock",
        storageBucket: "caixiang666-stock.firebasestorage.app",
        messagingSenderId: "504203288950",
        appId: "1:504203288950:web:2f93e0c6a2dde37f095a57"
    };

    // 3. 初始化补丁
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 4. 登录逻辑 (加了详细报错提示)
    async function doLogin() {
        const name = document.getElementById('pName').value.trim();
        const pwd = document.getElementById('pPwd').value;
        const btn = document.getElementById('loginBtn');
        
        if(!name || !pwd) return alert("名字和密码都要填！");

        btn.disabled = true;
        btn.innerText = "正在呼叫卫星...";

        try {
            // 去云端查数据
            const snap = await db.ref('users/' + name).once('value');
            const data = snap.val();

            if (!data) {
                // 没号自动注册
                await db.ref('users/' + name).set({ password: pwd, balance: 100000 });
                alert("欢迎新操盘手！已为你开户。");
                location.reload(); 
            } else if (data.password !== pwd) {
                alert("密码错啦！");
                btn.disabled = false;
                btn.innerText = "同步并进入";
            } else {
                // 登录成功
                playerName = name;
                balance = data.balance;
                document.getElementById('loginBox').style.display = 'none';
                initStocks(); // 开启股票初始化
                updateRanks(); // 刷新排行榜
            }
        } catch (e) {
            console.error(e);
            alert("连接失败: " + e.message);
            btn.disabled = false;
            btn.innerText = "重试";
        }
    }
    
    // 排行榜实时监听补丁
    function updateRanks() {
        db.ref('users').orderByChild('balance').limitToLast(10).on('value', (snap) => {
            let list = [];
            snap.forEach(child => {
                list.push({ n: child.key, b: child.val().balance });
            });
            list.reverse();
            let h = "<table><tr><th>排名</th><th>代号</th><th>资产</th></tr>";
            list.forEach((u, i) => h += `<tr><td>${i+1}</td><td>${u.n}</td><td>¥${u.b.toFixed(2)}</td></tr>`);
            document.getElementById('rankList').innerHTML = h + "</table>";
        });
    }

    // ... 下面继续放你之前的 initStocks, simulateDay 等函数 ...
</script>
