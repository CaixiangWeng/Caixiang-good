<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Caixiang666 模拟股票系统 - 联机版</title>
    <!-- 引入图表和 Firebase 核心库 -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #fbbf24; --up: #ef4444; --down: #22c55e; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: var(--bg); color: #f8fafc; padding: 20px; margin: 0; }
        .header { background: var(--card); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        #loginBox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--yellow); text-align: center; width: 300px; }
        .btn-yellow { background: var(--yellow) !important; color: #000 !important; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 90%; margin-bottom: 15px; }
        table { width: 100%; background: var(--card); border-collapse: collapse; margin-top: 20px; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        .up { color: var(--up) !important; font-weight: bold; }
        .down { color: var(--down) !important; font-weight: bold; }
        .btn-sim { width: 100%; padding: 15px; background: #f59e0b; color: white; border: none; border-radius: 10px; font-size: 18px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <h2 style="color: var(--yellow);">🚀 联机大盘登录</h2>
        <input type="text" id="pName" placeholder="代号 (新名字自动注册)">
        <input type="password" id="pPwd" placeholder="4位密码">
        <button id="loginBtn" class="btn-yellow" onclick="doLogin()">同步并进入</button>
    </div>
</div>

<div class="header">
    <div>
        <div style="font-size: 14px; color: #94a3b8;">账户资产</div>
        <div id="balanceDisplay" style="color: var(--yellow); font-size: 24px; font-weight: bold;">¥100,000.00</div>
    </div>
    <button onclick="getNews()" style="background: #8b5cf6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">📰 内幕消息</button>
</div>

<div id="newsBox" style="display:none; background:#fef3c7; color:#92400e; padding:15px; margin:20px 0; border-radius:8px;">
    <b>📢 内幕：</b> <span id="newsContent"></span>
</div>

<table>
    <thead><tr><th>代码</th><th>名称</th><th>现价</th><th>涨跌</th><th>持有</th><th>操作</th></tr></thead>
    <tbody id="stockBody"></tbody>
</table>

<button onclick="simulateDay()" class="btn-sim">⏳ 结束交易并更新榜单</button>

<div style="margin-top: 30px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155;">
    <h3 style="color: var(--yellow); margin-top: 0;">🏆 实时排行榜 (TOP 10)</h3>
    <div id="rankList">同步中...</div>
</div>

<script>
    // --- 🔑 已经帮你填好了 Firebase 钥匙 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAOCLu6X1gbrYzHLx_HlhJrtXQ_ftSddcQ",
      authDomain: "://firebaseapp.com",
      databaseURL: "https://firebasedatabase.app",
      projectId: "caixiang666-stock",
      storageBucket: "caixiang666-stock.firebasestorage.app",
      messagingSenderId: "504203288950",
      appId: "1:504203288950:web:2f93e0c6a2dde37f095a57"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 100000, stocks = [], playerName = "", activeNews = null;

    async function doLogin() {
        const name = document.getElementById('pName').value.trim();
        const pwd = document.getElementById('pPwd').value;
        if(!name || !pwd) return alert("账号密码必填！");

        const snap = await db.ref('users/' + name).once('value');
        const data = snap.val();

        if (!data) { // 自动注册
            await db.ref('users/' + name).set({ password: pwd, balance: 100000 });
            balance = 100000;
        } else if (data.password !== pwd) {
            return alert("密码错！");
        } else {
            balance = data.balance;
        }

        playerName = name;
        document.getElementById('loginBox').style.display = 'none';
        initStocks(); updateRanks();
    }

    function initStocks() {
        const adjs = ['芯片','能源','医疗','科技'], nouns = ['发展','实业','股份','集团'];
        stocks = [];
        for(let i=0; i<6; i++){
            let p = parseFloat((Math.random()*80+20).toFixed(2));
            stocks.push({code:'600'+Math.floor(Math.random()*899+100), name:adjs[Math.floor(Math.random()*adjs.length)]+nouns[Math.floor(Math.random()*nouns.length)], price:p, hold:0, history:[p]});
        }
        renderTable();
    }

    function renderTable() {
        const body = document.getElementById('stockBody'); body.innerHTML = '';
        stocks.forEach((s, i) => {
            let chg = s.history.length > 1 ? ((s.price - s.history[s.history.length-2])/s.history[s.history.length-2]*100).toFixed(2) : "0.00";
            body.innerHTML += `<tr><td>${s.code}</td><td>${s.name}</td><td>¥${s.price.toFixed(2)}</td><td class="${chg>=0?'up':'down'}">${chg}%</td><td>${s.hold}</td>
            <td><button onclick="buy(${i})" style="color:red; cursor:pointer;">买</button> <button onclick="sell(${i})" style="color:green; cursor:pointer;">卖</button></td></tr>`;
        });
        document.getElementById('balanceDisplay').innerText = `¥${balance.toLocaleString()}`;
    }

    async function simulateDay() {
        stocks.forEach(s => {
            let chg = (Math.random()*0.2-0.1);
            if(activeNews && s.name.includes(activeNews.k)) chg += activeNews.b;
            s.price = parseFloat((s.price*(1+chg)).toFixed(2)); s.history.push(s.price);
        });
        if(balance < 50000) alert("儿子别玩了，回乡种地吧！");
        
        // 关键：云端同步
        db.ref('users/' + playerName).update({ balance: balance });
        
        activeNews = null; document.getElementById('newsBox').style.display='none';
        renderTable();
    }

    function updateRanks() {
        db.ref('users').orderByChild('balance').limitToLast(10).on('value', (snap) => {
            let list = [];
            snap.forEach(child => { list.push({n: child.key, b: child.val().balance}); });
            list.reverse();
            let h = "<table><tr><th>排名</th><th>操盘手</th><th>资产</th></tr>";
            list.forEach((u, i) => h += `<tr><td>${i+1}</td><td>${u.n}</td><td>¥${u.b.toFixed(2)}</td></tr>`);
            document.getElementById('rankList').innerHTML = h + "</table>";
        });
    }

    function buy(idx){ let cost=stocks[idx].price*100; if(balance>=cost){ balance-=cost; stocks[idx].hold+=100; renderTable(); }else{alert("钱不够！");}}
    function sell(idx){ balance+=stocks[idx].hold*stocks[idx].price; stocks[idx].hold=0; renderTable(); }
    function getNews(){ if(confirm("看内幕叫爸爸？")){ activeNews={t:"芯片行业利好！",k:"芯片",b:0.18}; document.getElementById('newsBox').style.display='block'; document.getElementById('newsContent').innerText=activeNews.t; }}
</script>
</body>
</html>
